
<h2 class="sr-only">Enhanced BMI calculator with live feedback, unit toggle, and category gauge</h2>

<style>
.bmi-wrap{max-width:560px;margin:1rem auto;padding:0 1rem}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:5px;font-weight:500}
.field input{width:100%;box-sizing:border-box}
.unit-toggle{display:flex;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden;margin-bottom:1.25rem}
.unit-toggle button{flex:1;padding:7px;font-size:13px;border:none;background:transparent;cursor:pointer;color:var(--color-text-secondary);transition:background .15s,color .15s}
.unit-toggle button.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.calc-btn{width:100%;padding:10px;font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--border-radius-md);margin-bottom:1.5rem}
.result-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;display:none}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.metric-sub{font-size:11px;margin-top:2px}
.gauge-track{height:10px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:6px}
.gauge-seg{flex:1}
.gauge-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.gauge-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.cat-pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.advice-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:1rem}
.ideal-row{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-top:0.5px solid var(--color-border-tertiary)}
.tips-btn{width:100%;cursor:pointer;border-radius:var(--border-radius-md);font-size:13px;margin-top:4px}
.err{font-size:12px;color:var(--color-text-danger);margin-top:4px;min-height:16px}
</style>

<div class="bmi-wrap">

  <div class="unit-toggle">
    <button class="active" onclick="setUnit('metric')" id="btn-metric">Metric (kg / cm)</button>
    <button onclick="setUnit('imperial')" id="btn-imperial">Imperial (lb / in)</button>
  </div>

  <div class="input-row">
    <div class="field">
      <label id="lbl-weight">Weight (kg)</label>
      <input type="number" id="weight" placeholder="e.g. 70" step="0.1" oninput="liveCalc()" />
    </div>
    <div class="field">
      <label id="lbl-height">Height (cm)</label>
      <input type="number" id="height" placeholder="e.g. 175" step="0.1" oninput="liveCalc()" />
    </div>
  </div>
  <div class="err" id="err-msg"></div>

  <button class="calc-btn" onclick="calculate()">Calculate BMI</button>

  <div class="result-card" id="result-card">

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">BMI</div>
        <div class="metric-val" id="m-bmi">—</div>
        <div class="metric-sub" id="m-bmi-sub" style="color:var(--color-text-tertiary)">kg/m²</div>
      </div>
      <div class="metric">
        <div class="metric-label">Category</div>
        <div class="metric-val" id="m-cat" style="font-size:14px;margin-top:4px">—</div>
        <div class="metric-sub" id="m-cat-sub" style="color:var(--color-text-tertiary)"></div>
      </div>
      <div class="metric">
        <div class="metric-label">Ideal weight</div>
        <div class="metric-val" id="m-ideal" style="font-size:14px;margin-top:4px">—</div>
        <div class="metric-sub" id="m-ideal-sub" style="color:var(--color-text-tertiary)"></div>
      </div>
    </div>

    <div class="gauge-labels">
      <span>16</span><span>18.5</span><span>25</span><span>30</span><span>40</span>
    </div>
    <div style="position:relative;margin-bottom:4px;">
      <div class="gauge-track">
        <div class="gauge-seg" style="background:#5DCAA5;flex:2.5"></div>
        <div class="gauge-seg" style="background:#639922;flex:6.5"></div>
        <div class="gauge-seg" style="background:#EF9F27;flex:5"></div>
        <div class="gauge-seg" style="background:#E24B4A;flex:10"></div>
      </div>
      <div id="needle" style="position:absolute;top:-3px;width:4px;height:16px;border-radius:2px;background:var(--color-text-primary);transform:translateX(-50%);transition:left .4s ease;left:0%"></div>
    </div>
    <div class="gauge-cats">
      <span class="cat-pill" style="background:#E1F5EE;color:#085041">Underweight &lt;18.5</span>
      <span class="cat-pill" style="background:#EAF3DE;color:#27500A">Normal 18.5–24.9</span>
      <span class="cat-pill" style="background:#FAEEDA;color:#633806">Overweight 25–29.9</span>
      <span class="cat-pill" style="background:#FCEBEB;color:#791F1F">Obese ≥30</span>
    </div>

    <div class="advice-box" id="advice-box"></div>

    <div class="ideal-row">
      <span style="color:var(--color-text-secondary);font-size:13px">To reach normal range, target weight:</span>
      <span style="font-weight:500;font-size:13px" id="target-range">—</span>
    </div>

    <button class="tips-btn" onclick="askTips()">Get personalised health tips ↗</button>
  </div>
</div>

<script>
var unit = 'metric';
var lastBmi = null;
var lastH = null;

function setUnit(u) {
  unit = u;
  document.getElementById('btn-metric').classList.toggle('active', u==='metric');
  document.getElementById('btn-imperial').classList.toggle('active', u==='imperial');
  document.getElementById('lbl-weight').textContent = u==='metric' ? 'Weight (kg)' : 'Weight (lb)';
  document.getElementById('lbl-height').textContent = u==='metric' ? 'Height (cm)' : 'Height (in)';
  document.getElementById('weight').placeholder = u==='metric' ? 'e.g. 70' : 'e.g. 154';
  document.getElementById('height').placeholder = u==='metric' ? 'e.g. 175' : 'e.g. 69';
  document.getElementById('weight').value = '';
  document.getElementById('height').value = '';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('err-msg').textContent = '';
}

function getMetric() {
  var w = parseFloat(document.getElementById('weight').value);
  var h = parseFloat(document.getElementById('height').value);
  if (unit === 'imperial') { w = w * 0.453592; h = h * 2.54; }
  return {w, h};
}

function validate(w, h) {
  if (isNaN(w) || isNaN(h)) return 'Please enter both weight and height.';
  if (w < 20 || w > 300) return 'Weight must be between ' + (unit==='metric'?'20–300 kg':'44–660 lb') + '.';
  if (h < 50 || h > 250) return 'Height must be between ' + (unit==='metric'?'50–250 cm':'20–98 in') + '.';
  return null;
}

function liveCalc() {
  var {w, h} = getMetric();
  var err = validate(w, h);
  document.getElementById('err-msg').textContent = err ? '' : '';
  if (!err) {
    var bmi = w / ((h/100) * (h/100));
    document.getElementById('m-bmi').textContent = bmi.toFixed(1);
    updateNeedle(bmi);
    lastBmi = bmi; lastH = h;
  }
}

function calculate() {
  var {w, h} = getMetric();
  var err = validate(w, h);
  document.getElementById('err-msg').textContent = err || '';
  if (err) return;

  var bmi = w / ((h/100) * (h/100));
  lastBmi = bmi; lastH = h;

  var info = getCategory(bmi);
  var hm = h / 100;
  var idealLow = (18.5 * hm * hm);
  var idealHigh = (24.9 * hm * hm);
  var idealStr = unit === 'imperial'
    ? (idealLow / 0.453592).toFixed(1) + '–' + (idealHigh / 0.453592).toFixed(1) + ' lb'
    : idealLow.toFixed(1) + '–' + idealHigh.toFixed(1) + ' kg';
  var dispW = unit === 'imperial'
    ? (w / 0.453592).toFixed(1) + ' lb'
    : w.toFixed(1) + ' kg';

  document.getElementById('m-bmi').textContent = bmi.toFixed(1);
  document.getElementById('m-bmi-sub').textContent = 'kg/m²';
  document.getElementById('m-cat').textContent = info.cat;
  document.getElementById('m-cat').style.color = info.text;
  document.getElementById('m-ideal').textContent = idealStr.split('–')[0].split(' ')[0] + '–';
  document.getElementById('m-ideal').textContent = idealStr;
  document.getElementById('m-ideal').style.color = '#3B6D11';
  document.getElementById('m-ideal-sub').textContent = 'healthy range';
  document.getElementById('advice-box').textContent = info.advice;
  document.getElementById('target-range').textContent = idealStr;
  updateNeedle(bmi);

  document.getElementById('result-card').style.display = 'block';
}

function updateNeedle(bmi) {
  var clamped = Math.min(Math.max(bmi, 16), 40);
  var pct = ((clamped - 16) / 24) * 100;
  document.getElementById('needle').style.left = pct.toFixed(1) + '%';
}

function getCategory(bmi) {
  if (bmi < 18.5) return {cat:'Underweight', text:'#085041', advice:'Your BMI is below the healthy range. Consider consulting a nutritionist to build a balanced diet plan and reach a healthy weight gradually.'};
  if (bmi < 25)   return {cat:'Normal weight', text:'#27500A', advice:'Your BMI is in the healthy range. Sustain it with regular activity, a varied diet, and adequate sleep. Keep up the great work.'};
  if (bmi < 30)   return {cat:'Overweight', text:'#633806', advice:'Your BMI is slightly above the healthy range. Small changes — like 30 min of daily walking and reducing processed foods — can make a meaningful difference.'};
  return {cat:'Obese', text:'#791F1F', advice:'Your BMI falls in the obese range. Speaking with a healthcare provider can help you create a safe, sustainable plan tailored to your situation.'};
}

function askTips() {
  var bmi = lastBmi ? lastBmi.toFixed(1) : '?';
  var cat = lastBmi ? getCategory(lastBmi).cat : 'unknown';
  sendPrompt('My BMI is ' + bmi + ' (' + cat + '). Can you give me personalised health and diet tips?');
}
</script>
